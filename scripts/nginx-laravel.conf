# =============================================================================
# nginx-laravel.conf — psec.unap.edu.pe
# VirtualHost para aplicación Laravel detrás de proxy inverso externo.
#
# El proxy inverso maneja HTTPS (psec.unap.edu.pe:443).
# Este servidor recibe HTTP en puerto 80 y reenvía headers del proxy.
#
# Instalación:
#   cp nginx-laravel.conf /etc/nginx/sites-available/psec
#   ln -s /etc/nginx/sites-available/psec /etc/nginx/sites-enabled/psec
#   nginx -t && systemctl reload nginx
# =============================================================================

server {
    listen 80;
    listen [::]:80;

    # Acepta cualquier hostname (tráfico llega por IP desde el proxy inverso)
    server_name _;

    root /var/www/psec/public;
    index index.php index.html;

    # ── Logs ──────────────────────────────────────────────────────────────
    access_log /var/log/nginx/psec_access.log combined;
    error_log  /var/log/nginx/psec_error.log warn;

    # ── Charset ───────────────────────────────────────────────────────────
    charset utf-8;

    # ── Tamaño máximo de subida ───────────────────────────────────────────
    client_max_body_size 64M;

    # ── Headers del proxy inverso ─────────────────────────────────────────
    # Permite que Laravel detecte correctamente HTTPS y la IP real del cliente.
    set_real_ip_from  0.0.0.0/0;
    real_ip_header    X-Forwarded-For;
    real_ip_recursive on;

    # ── Gzip ──────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        text/javascript
        application/javascript
        application/json
        application/xml
        image/svg+xml;

    # ── Rutas Laravel ─────────────────────────────────────────────────────
    location / {
        try_files $uri $uri/ /index.php?$query_string;
    }

    # ── PHP-FPM ───────────────────────────────────────────────────────────
    location ~ \.php$ {
        try_files $uri =404;
        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass unix:/run/php/php8.3-fpm.sock;
        fastcgi_index index.php;
        fastcgi_param SCRIPT_FILENAME $realpath_root$fastcgi_script_name;
        fastcgi_param PATH_INFO $fastcgi_path_info;

        # Propagar headers del proxy inverso hacia PHP
        fastcgi_param HTTP_X_FORWARDED_FOR   $http_x_forwarded_for;
        fastcgi_param HTTP_X_FORWARDED_PROTO $http_x_forwarded_proto;
        fastcgi_param HTTP_X_REAL_IP         $http_x_real_ip;

        include fastcgi_params;

        fastcgi_connect_timeout 60s;
        fastcgi_read_timeout    120s;
        fastcgi_send_timeout    120s;
        fastcgi_buffer_size     16k;
        fastcgi_buffers         4 16k;
    }

    # ── Assets estáticos (caché agresivo) ─────────────────────────────────
    location ~* \.(css|js|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot|webp)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # ── Bloquear acceso a archivos sensibles ──────────────────────────────
    location ~ /\.(env|git|htaccess|htpasswd) {
        deny all;
        return 404;
    }

    location ~ ^/(composer\.(json|lock)|package\.json|webpack\.mix\.js|artisan)$ {
        deny all;
        return 404;
    }

    # ── Seguridad: headers adicionales ────────────────────────────────────
    add_header X-Content-Type-Options "nosniff"   always;
    add_header X-Frame-Options        "SAMEORIGIN" always;
    add_header X-XSS-Protection       "1; mode=block" always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
