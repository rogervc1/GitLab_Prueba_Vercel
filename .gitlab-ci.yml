# ─────────────────────────────────────────────────────────────────────────────
# CI/CD Pipeline — psec.unap.edu.pe
# Dispara en push a `main` → deploy automático via SSH al VPS de producción.
# El desarrollador solo hace git push; nunca accede al servidor directamente.
#
# Variables requeridas (GitLab → Settings → CI/CD → Variables, todas Protected):
#   PROD_HOST     — IP del VPS
#   PROD_USER     — deployer
#   PROD_SSH_KEY  — clave privada SSH (tipo File, Protected, Visible)
#   PROD_PATH     — /var/www/psec
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - deploy

deploy_production:
  stage: deploy
  image: alpine:3.20

  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - chmod 600 "$PROD_SSH_KEY" && ssh-add "$PROD_SSH_KEY"
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - ssh-keyscan -H "$PROD_HOST" >> ~/.ssh/known_hosts

  script:
    - scp scripts/deploy.sh "$PROD_USER@$PROD_HOST:$PROD_PATH/deploy.sh"
    - ssh "$PROD_USER@$PROD_HOST" "chmod +x $PROD_PATH/deploy.sh && bash $PROD_PATH/deploy.sh"

  rules:
    - if: $CI_COMMIT_BRANCH == "main"

  environment:
    name: production
    url: https://psec.unap.edu.pe
